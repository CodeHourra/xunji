# 推送语义化版本 tag（如 v0.1.3）时：
# 1) 与原先一致：在 ubuntu 上由 softprops 创建/更新 GitHub Release 并 generate_release_notes（PR 合并后再打 tag 的流程不变）。
# 2) tauri build（macOS：aarch64 + x86_64，无 Windows，省 CI）；latest.json 需含 Intel Mac 所用 darwin-x86_64，否则检查更新会报 platforms 缺失。
# 依赖 Secrets：TAURI_SIGNING_PRIVATE_KEY（必填）；TAURI_SIGNING_PRIVATE_KEY_PASSWORD（可选）。
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # 指向 master 的 PR：预检 changelog 等与发版相关的条件，避免仅依赖打 tag 后才发现问题（完整构建见 CI）
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  # ── 与历史 release.yml 一致：先建 Release + 自动生成说明（无构建）────────────────
  github-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 打 tag 后：构建并上传到上述 Release（双架构 macOS；不跑 Windows 以省 CI）──
  publish-tauri:
    if: github.event_name == 'push'
    needs: github-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon：应用内更新主路径
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          # Intel Mac / Rosetta x86：与上共存于 latest.json，缺则报 darwin-x86_64 not in platforms
          - platform: macos-latest
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify changelog sync
        run: |
          bun run sync:changelog
          git diff --exit-code apps/desktop/src/data/app-changelog.md

      - name: Require updater signing secret
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo '::error::未配置 TAURI_SIGNING_PRIVATE_KEY。请阅读 docs/桌面应用-Release与自动更新.md 生成密钥并写入仓库 Secrets。'
            exit 1
          fi

      - name: Install Rust stable
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable (macOS aarch64 + x86_64)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: bun run tauri
          releaseId: ${{ needs.github-release.outputs.release_id }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # ── PR → master：发版前预检（与 tag 构建共用 changelog 校验逻辑）────────────────
  release-pr-precheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify changelog sync
        run: |
          bun run sync:changelog
          git diff --exit-code apps/desktop/src/data/app-changelog.md
