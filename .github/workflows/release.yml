# 推送形如 v0.1.2 的 tag 时自动创建 GitHub Release（含自动生成的提交说明）。
# 若后续需要上传各平台安装包，可在此 job 中追加 matrix 与 tauri build。
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
